- defaults:
    link:
        create: true
        force: true
- link:
    # Window manager
    ~/.config/sway: sway
    ~/.config/swaylock: swaylock
    ~/.config/wallpapers: wallpapers
    ~/.config/waybar: waybar
    # Shell
    ~/.config/fish: fish
    ~/.config/omf: omf
    # Applications
    ~/.config/nvim: nvim
    ~/.config/git: git
    ~/.config/alacritty: alacritty
    ~/.config/ranger: ranger
    ~/.config/zathura: zathura
    ~/.proxychains: proxychains
    ~/.config/mako: mako
    ~/.config/ulauncher: ulauncher
    ~/.config/nyxt : nyxt
- shell:
    - [git clone https://github.com/P3TERX/aria2.conf.git ~/.aria2]
- link:
    ~/.aria2/aria2.conf:
      path: aria2/aria2.conf
    # Developments
    ~/.cargo: cargo
    ~/.roswell/init.lisp: roswell/init.lisp
    # Scripts
    ~/Scripts: scripts
    # Electron
    ~/.config/electron-flags.conf: electron/electron-flags.conf
    ~/.config/electron12-flags.conf: electron/electron-flags.conf
    ~/.config/chrome-flags.conf: electron/electron-flags.conf
    ~/.config/chromium-flags.conf: electron/electron-flags.conf
    ~/.inputrc: readline/.inputrc
    ~/.config/kitty: kitty
    ~/.zshenv: zsh/.zshenv.home
    ~/.config/zsh: zsh
    ~/.config/starship: starship
    ~/.config/bat: bat
    ~/.config/kmonad: kmonad
- shell:
    - [git clone --depth 1 https://github.com/dexpota/kitty-themes.git ~/.config/kitty/kitty-themes]
    - [ln -s ~/.config/kitty/kitty-themes/themes/Apprentice.conf ~/.config/kitty/theme.conf]
    - [mkdir -p ~/.local/share/applications]
    - [cp ./entries/* ~/.local/share/applications]
